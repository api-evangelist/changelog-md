created: '2025-01-01'
modified: '2026-04-23'
position: Producer
description: >-
  CHANGELOG.md is a community convention for a human-readable, Markdown-
  formatted file at the root of a project that records notable changes
  between versions. The leading specification is "Keep a Changelog" by
  Olivier Lacan, which defines a stable, opinionated set of section
  headings (Added, Changed, Deprecated, Removed, Fixed, Security) and
  recommends pairing with Semantic Versioning (SemVer). The format is
  widely adopted across open source and enterprise projects as the de
  facto way to document API and software releases in a way that is
  readable by humans and parseable by tooling.
